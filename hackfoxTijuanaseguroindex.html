<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AccessiMap Tijuana</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* --- Screens --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.4s ease, transform 0.4s ease;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* --- Landing Screen --- */
        #landing-screen {
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            z-index: 20;
        }

        .logo-container svg {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .catchphrase {
            font-size: 1.25rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .description {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 400px;
            margin-bottom: 2.5rem;
        }

        .btn-large {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 350px;
        }

        .btn-large:active {
            transform: scale(0.96);
            background-color: var(--accent-hover);
        }

        /* --- Map Screen --- */
        #map-screen {
            display: flex;
            flex-direction: column;
        }

        .header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 1.5rem 1rem;
            background: linear-gradient(to bottom, rgba(15,23,42,0.9) 0%, transparent 100%);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .header h2 {
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #map {
            flex: 1;
            width: 100%;
            background-color: #1a1a1a;
            z-index: 1;
            cursor: crosshair; /* Indica que se puede hacer clic */
        }

        .leaflet-control-zoom a {
            background-color: var(--bg-card) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border) !important;
        }

        /* --- Dark Theme Leaflet Popups --- */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: var(--bg-card) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border);
            border-radius: 16px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .leaflet-popup-content {
            margin: 12px 14px !important;
            line-height: 1.4;
        }
        .leaflet-container a.leaflet-popup-close-button {
            color: var(--text-muted) !important;
            padding: 8px 8px 0 0 !important;
        }

        /* --- Floating Action Buttons --- */
        .fab-container {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 1rem;
            pointer-events: none;
        }

        .fab {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            white-space: nowrap;
        }

        .fab:active { transform: scale(0.95); }

        /* --- Custom Markers --- */
        .custom-marker {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .marker-green { background-color: var(--green); box-shadow: 0 0 15px var(--green); }
        .marker-yellow { background-color: var(--yellow); box-shadow: 0 0 15px var(--yellow); }
        .marker-red { background-color: var(--red); box-shadow: 0 0 15px var(--red); }
        .marker-temp { background-color: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* --- Modals --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 2rem;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        @media (min-width: 600px) {
            .modal-overlay { align-items: center; }
            .modal-content { border-radius: 20px; transform: scale(0.9); }
            .modal-overlay.active .modal-content { transform: scale(1); }
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .photo-upload {
            width: 100%;
            height: 150px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            margin-bottom: 1.5rem;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .photo-upload:hover { border-color: var(--accent); background-color: rgba(255,255,255,0.02); }
        .photo-upload svg { margin-bottom: 10px; fill: currentColor; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        select, textarea {
            width: 100%;
            background-color: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        select:focus, textarea:focus { border-color: var(--accent); }

        .location-mock {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--green);
            margin-bottom: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            padding: 12px;
            border-radius: 10px;
        }

        /* --- Popup Inner Styles --- */
        .popup-container { min-width: 180px; }
        .popup-title { font-weight: 700; margin-bottom: 4px; font-size: 0.95rem; }
        .popup-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; }
        .popup-img { width: 100%; max-height: 110px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; display: block; background: #334155; }
        
        .btn-delete-report {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            width: 100%;
            padding: 6px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .btn-delete-report:hover { background-color: var(--red); color: white; }

        .btn-confirm-location {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }

        /* --- Loading & Toast --- */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loader-overlay.active { opacity: 1; pointer-events: auto; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: var(--green);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 4000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            text-align: center;
            width: 90%; max-width: 400px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.toast-error { background-color: var(--red); }
    </style>
</head>
<body>

    <section id="landing-screen" class="screen">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#1e293b" stroke="#3b82f6" stroke-width="4"/>
                <path d="M50 20 C65 20, 75 35, 75 50 C75 70, 50 85, 50 85 C50 85, 25 70, 25 50 C25 35, 35 20, 50 20 Z" fill="#3b82f6" opacity="0.8"/>
                <circle cx="50" cy="38" r="6" fill="white"/>
                <path d="M50 48 L50 65 M42 55 L58 55 M45 70 L50 65 L55 70" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>AccessiMap</h1>
        <div class="catchphrase">"Mapeando barreras, abriendo caminos"</div>
        <p class="description">Ayuda a construir una ciudad más accesible reportando obstáculos en banquetas, rampas bloqueadas y problemas de movilidad.</p>
        <button class="btn-large" onclick="iniciarMapa()">Abrir Mapa</button>
    </section>

    <section id="map-screen" class="screen hidden">
        <div class="header">
            <h2>📍 Tijuana Reporta</h2>
        </div>
        
        <div id="map"></div>
        
        <div class="fab-container">
            <button class="fab" onclick="solicitarUbicacionManual()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Agregar Reporte
            </button>
        </div>
    </section>

    <div id="report-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reportar Barrera Física</h3>
                <button class="close-btn" onclick="cerrarModalReporte()">×</button>
            </div>
            
            <input type="file" id="camera-input" accept="image/*" style="display: none;" onchange="previewImage(event)">
            <div class="photo-upload" id="photo-area" onclick="document.getElementById('camera-input').click()">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                <span>Tomar o subir fotografía</span>
            </div>

            <div class="form-group">
                <label>Tipo de Obstáculo</label>
                <select id="tipo-obstaculo">
                    <option value="Banqueta Destruida">Banqueta destruida / Grietas graves</option>
                    <option value="Rampa Bloqueada">Rampa ausente o bloqueada</option>
                    <option value="Vehículo Mal Estacionado">Vehículo obstruyendo el paso</option>
                    <option value="Escombro u Obra">Material de construcción / Escombros</option>
                </select>
            </div>

            <div class="form-group">
                <label>Descripción detallada</label>
                <textarea id="desc-obstaculo" rows="3" placeholder="Describe brevemente el problema para alertar a la comunidad..."></textarea>
            </div>

            <div class="location-mock">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                Ubicación confirmada en el mapa.
            </div>

            <button class="btn-large" style="width: 100%; border-radius: 12px;" onclick="enviarReporte()">Publicar Reporte</button>
        </div>
    </div>

    <div id="loading" class="loader-overlay">
        <div class="spinner"></div>
        <h3 id="loading-text" style="color: white; font-weight: 400;">Cargando...</h3>
    </div>

    <div id="toast" class="toast">
        <span id="toast-msg">Mensaje</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let uploadedPhotoDataUrl = ''; 
        let miUbicacionActual = [32.5283, -117.0211]; // Centro de Tijuana
        
        let marcadorTemporal = null; // Pin para que el usuario elija dónde reportar
        let coordenadasNuevoReporte = null; // Guarda las coords exactas al confirmar

        function iniciarMapa() {
            document.getElementById('landing-screen').classList.add('hidden');
            document.getElementById('map-screen').classList.remove('hidden');

            setTimeout(() => {
                map = L.map('map', { zoomControl: false }).setView(miUbicacionActual, 14);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CARTO'
                }).addTo(map);

                L.control.zoom({ position: 'topright' }).addTo(map);

                // Integración GPS Real
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            miUbicacionActual = [position.coords.latitude, position.coords.longitude];
                            map.setView(miUbicacionActual, 15);
                            agregarMarcadorComunidad(miUbicacionActual, 'marker-green', 'Tu Ubicación', 'Te encuentras aquí.', null);
                        },
                        (error) => { console.log("GPS no disponible, usando Tijuana por defecto."); }
                    );
                }

                // EVENTO CLAVE: Cuando el usuario toca el mapa
                map.on('click', function(e) {
                    colocarMarcadorParaReporte(e.latlng);
                });

                // Obstáculos de muestra iniciales
                agregarMarcadorComunidad([32.5310, -117.0250], 'marker-yellow', 'Banqueta muy Angosta', 'Complicado para sillas de ruedas.', 'https://images.unsplash.com/photo-1590055531772-91118fa3a233?auto=format&fit=crop&w=300&q=80');
                agregarMarcadorComunidad([32.5250, -117.0280], 'marker-red', 'Zanja y Escombros', 'Bloqueo completo por reparaciones.', 'https://images.unsplash.com/photo-1584467541268-b040f83be3fd?auto=format&fit=crop&w=300&q=80');

                mostrarToast("Toca cualquier punto del mapa para agregar un reporte");
            }, 400);
        }

        // --- SISTEMA DE SELECCIÓN DE UBICACIÓN ---
        function solicitarUbicacionManual() {
            // Si aprietan el botón, ponemos el pin en el centro actual de la pantalla
            colocarMarcadorParaReporte(map.getCenter());
            mostrarToast("Arrastra el mapa si necesitas ajustar la posición");
        }

        function colocarMarcadorParaReporte(latlng) {
            // Eliminar pin temporal previo si existe
            if (marcadorTemporal) {
                map.removeLayer(marcadorTemporal);
            }

            const tempIcon = L.divIcon({
                className: 'custom-icon',
                html: `<div class="custom-marker marker-temp"></div>`,
                iconSize: [22, 22],
                iconAnchor: [11, 11]
            });

            marcadorTemporal = L.marker(latlng, { icon: tempIcon }).addTo(map);

            // Crear popup con botón de confirmación
            const contenido = document.createElement('div');
            contenido.style.textAlign = 'center';
            contenido.innerHTML = `
                <p style="margin: 0 0 10px 0; font-weight: bold; font-size: 0.95rem;">¿El obstáculo está aquí?</p>
                <button class="btn-confirm-location">Sí, reportar aquí</button>
            `;

            // Escuchar el clic en el botón de confirmación
            contenido.querySelector('button').onclick = function() {
                abrirFormularioReporte(latlng);
            };

            marcadorTemporal.bindPopup(contenido, { closeOnClick: false }).openPopup();
        }

        function abrirFormularioReporte(latlng) {
            // Guardamos las coordenadas exactas seleccionadas
            coordenadasNuevoReporte = latlng;
            
            // Cerramos el pin temporal y abrimos la ventana
            map.removeLayer(marcadorTemporal);
            marcadorTemporal = null;
            document.getElementById('report-modal').classList.add('active');
        }

        // --- CREACIÓN DE REPORTES EN EL MAPA ---
        function enviarReporte() {
            const tipo = document.getElementById('tipo-obstaculo').value;
            const desc = document.getElementById('desc-obstaculo').value || 'Obstáculo reportado por la comunidad.';

            cerrarModalReporte();
            mostrarLoading("Publicando reporte ciudadano...");

            setTimeout(() => {
                ocultarLoading();
                
                // Usamos las coordenadas que el usuario seleccionó (coordenadasNuevoReporte)
                const nuevoM = agregarMarcadorComunidad(coordenadasNuevoReporte, 'marker-red', tipo, desc, uploadedPhotoDataUrl);
                nuevoM.openPopup();

                mostrarToast("🎉 Reporte agregado con éxito al mapa");
            }, 1000);
        }

        function agregarMarcadorComunidad(latlng, colorClass, titulo, descripcion, fotoUrl) {
            const customIcon = L.divIcon({
                className: 'custom-icon',
                html: `<div class="custom-marker ${colorClass}"></div>`,
                iconSize: [22, 22],
                iconAnchor: [11, 11]
            });

            const nuevoMarcador = L.marker(latlng, { icon: customIcon }).addTo(map);

            const popupWrapper = document.createElement('div');
            popupWrapper.className = 'popup-container';
            const colorHex = colorClass === 'marker-red' ? 'var(--red)' : colorClass === 'marker-yellow' ? 'var(--yellow)' : 'var(--green)';

            popupWrapper.innerHTML = `
                <div class="popup-title" style="color: ${colorHex}">${titulo}</div>
                <div class="popup-desc">${descripcion}</div>
                ${fotoUrl ? `<img src="${fotoUrl}" class="popup-img" alt="Foto del reporte">` : ''}
            `;

            // Botón para que el usuario pueda eliminar el reporte que creó
            const btnEliminar = document.createElement('button');
            btnEliminar.className = 'btn-delete-report';
            btnEliminar.innerHTML = `
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Eliminar reporte
            `;
            btnEliminar.onclick = function() {
                map.removeLayer(nuevoMarcador);
                mostrarToast("❌ Reporte removido del mapa", true);
            };

            popupWrapper.appendChild(btnEliminar);
            nuevoMarcador.bindPopup(popupWrapper);

            return nuevoMarcador;
        }

        // --- CONTROLADORES DE MODALES Y FOTOS ---
        function cerrarModalReporte() {
            document.getElementById('report-modal').classList.remove('active');
            const area = document.getElementById('photo-area');
            area.style.backgroundImage = 'none';
            area.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg><span>Tomar o subir fotografía</span>';
            document.getElementById('desc-obstaculo').value = '';
            uploadedPhotoDataUrl = '';
        }
        
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedPhotoDataUrl = e.target.result;
                    const area = document.getElementById('photo-area');
                    area.style.backgroundImage = `url(${uploadedPhotoDataUrl})`;
                    area.innerHTML = ''; 
                }
                reader.readAsDataURL(file);
            }
        }

        function mostrarLoading(texto) {
            document.getElementById('loading-text').innerText = texto;
            document.getElementById('loading').classList.add('active');
        }
        function ocultarLoading() { document.getElementById('loading').classList.remove('active'); }

        function mostrarToast(mensaje, esError = false) {
            const toast = document.getElementById('toast');
            const msgSpan = document.getElementById('toast-msg');
            msgSpan.innerText = mensaje;
            if (esError) toast.classList.add('toast-error'); else toast.classList.remove('toast-error');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
